<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mini Player React</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="player3.css">
</head>

<body>
<div id="root"></div>
<script type="text/babel">

const playlist = [
  {
    src: 'Bach - Invention No. 04.mp3',
    title: 'Invention No. 04',
    artist: 'Bach',
    cover: 'piano.webp'
  },
  {
    src: 'Bach - Invention No. 10.mp3',
    title: 'Invention No. 10',
    artist: 'Bach',
    cover: 'piano.webp'
  },  
  {
    src: 'Bach - Invention No. 13.mp3',
    title: 'Invention No. 13',
    artist: 'Bach',
    cover: 'piano.webp'
  },
];

function Player() {

  // =======================
  // 🧠 STATE
  // =======================
  const [currentIndex, setCurrentIndex] = React.useState(0);
  const [isPlaying, setIsPlaying] = React.useState(false);

  const [currentTime, setCurrentTime] = React.useState(0);
  const [duration, setDuration] = React.useState(0);

  const audioRef = React.useRef(null);

  const track = playlist[currentIndex];

  // =======================
  // ▶️ PLAY / PAUSE
  // =======================
  function play() {
    audioRef.current.play();
    setIsPlaying(true);
  }

  function pause() {
    audioRef.current.pause();
    setIsPlaying(false);
  }

  function togglePlay() {
    isPlaying ? pause() : play();
  }

  // =======================
  // ⏭ NEXT / PREV
  // =======================
  function nextTrack() {
    setCurrentIndex((currentIndex + 1) % playlist.length);
    setIsPlaying(true);
  }

  function previousTrack() {
    if (audioRef.current.currentTime > 3) {
      audioRef.current.currentTime = 0;
    } else {
      setCurrentIndex(
        (currentIndex - 1 + playlist.length) % playlist.length
      );
    }
  }

  // =======================
  // 🔁 AUTO PLAY
  // =======================
  React.useEffect(() => {
    if (isPlaying) {
      audioRef.current.play();
    }
  }, [currentIndex]);

  // =======================
  // MEDIA SESSION
  // =======================

  React.useEffect(() => {
    if (!('mediaSession' in navigator)) return;

    const track = playlist[currentIndex];

    // 🎨 métadonnées
    navigator.mediaSession.metadata = new MediaMetadata({
      title: track.title,
      artist: track.artist,
      artwork: [
        { src: track.cover || "", sizes: "512x512", type: "image/jpeg" }
      ]
    });

    // ▶️ actions système
    navigator.mediaSession.setActionHandler('play', () => {
      audioRef.current.play();
      setIsPlaying(true);
    });

    navigator.mediaSession.setActionHandler('pause', () => {
      audioRef.current.pause();
      setIsPlaying(false);
    });

    navigator.mediaSession.setActionHandler('nexttrack', () => {
      nextTrack();
    });

    navigator.mediaSession.setActionHandler('previoustrack', () => {
      previousTrack();
    });

  }, [currentIndex]);

  React.useEffect(() => {
    if (!('mediaSession' in navigator)) return;

    navigator.mediaSession.playbackState = isPlaying
      ? "playing"
      : "paused";

  }, [isPlaying]);


  // =======================
  // ⏱ UPDATE TIME
  // =======================
  function handleTimeUpdate() {
    setCurrentTime(audioRef.current.currentTime);
    setDuration(audioRef.current.duration || 0);
  }

  // =======================
  // 🎚 SEEK
  // =======================
  function handleSeek(e) {
    const newTime = e.target.value;
    audioRef.current.currentTime = newTime;
    setCurrentTime(newTime);
  }

  // =======================
  // 🎵 PLAYLIST CLICK
  // =======================
  function selectTrack(index) {
    setCurrentIndex(index);
    setIsPlaying(true);
  }

  // =======================
  // 🎨 UI
  // =======================
  return (
    <div style={{ display: "flex", gap: "30px" }}>

      {/* PLAYER */}
      <div className="player">
        <img src={track.cover}></img>
        <h2>{track.title}</h2>
        <p>{track.artist}</p>

        <button onClick={previousTrack}>⏮</button>
        <button onClick={togglePlay}>
          {isPlaying ? "⏸" : "▶️"}
        </button>
        <button onClick={nextTrack}>⏭</button>

        {/* 🎚 PROGRESS BAR */}
        <input
          type="range"
          min="0"
          max={duration}
          value={currentTime}
          step="0.1"
          onChange={handleSeek}
        />

        {/* ⏱ TIME DISPLAY */}
        <div>
          {Math.floor(currentTime)} / {Math.floor(duration)} sec
        </div>

        <audio
          ref={audioRef}
          src={track.src}
          onTimeUpdate={handleTimeUpdate}
          onLoadedMetadata={handleTimeUpdate}
          onEnded={nextTrack}
        />
      </div>

      {/* PLAYLIST */}
      <div className="playlist">
        {playlist.map((t, index) => (
          <div
            key={index}
            className={
              "track " + (index === currentIndex ? "active" : "")
            }
            onClick={() => selectTrack(index)}
          >
            {t.title} - {t.artist}
          </div>
        ))}
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Player />);

</script>

</body>
</html>
