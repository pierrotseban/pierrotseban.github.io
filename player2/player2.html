
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mini Spotify Web</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="player2.css">
</head>

<body>

  <div id="player">
    <img id="cover" src="" alt="cover">
    <h2 id="title">Titre</h2>
    <p id="artist">Artiste</p>

    <div>
      <button id="prev">⏮</button>
      <button id="play">▶️</button>
      <button id="next">⏭</button>
    </div>

    <input type="range" id="progress" value="0" min="0" step="0.1">
  </div>
  
  <div id="playlist"></div>
  
  <audio id="audio"></audio>

  <script src="player2.js"></script>
</body>
</html>
