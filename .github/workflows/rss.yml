name: Fetch RSS

on:
  schedule:
    - cron: "30 14 * * *"   # tous les jours à 14h30
  workflow_dispatch:      # bouton manuel

jobs:

  fetch:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run script
        run: python _scripts/fetch_rss.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add _data/posts.json
          git commit -m "Update RSS feed" || echo "No changes"
          git push